version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: safepay-postgres
    environment:
      POSTGRES_DB: safepay_db
      POSTGRES_USER: safepay_user
      POSTGRES_PASSWORD: safepay_pass
    ports:
      - "5432:5432"
    volumes:
      - safepay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepay_user -d safepay_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  safepay_pgdata:
    driver: local
